<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>
  <style>
    * { box-sizing: border-box; }
    body { 
      margin: 0; 
      background-color: #f0f3f6; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding: 20px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #app { 
      background: white; 
      padding: 20px; 
      border-radius: 12px; 
      box-shadow: 0 8px 24px rgba(0,0,0,0.08); 
    }
    h2 { margin-top: 0; color: #2c3e50; font-size: 20px; text-align: center; margin-bottom: 15px; }
    #controls { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; }
    #controls button {
      padding: 8px 20px; font-size: 14px; font-weight: bold; cursor: pointer;
      border: none; border-radius: 6px; transition: all 0.2s;
    }
    #bStart { background: #2ecc71; color: white; }
    #bPause { background: #e67e22; color: white; }
    #bResume { background: #3498db; color: white; }
    #bReset { background: #e74c3c; color: white; }
    #controls button:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.05); }
    #controls button:disabled { opacity: 0.3; cursor: default; transform: none; }
    #cvs { border: 1px solid #e0e0e0; border-radius: 8px; background: #fafafa; display: block; }
    #info { margin-top: 12px; font-size: 12px; color: #666; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-top: 1px solid #eee; padding-top: 12px; }
    .status-tag { background: #f4f6f8; padding: 4px 8px; border-radius: 4px; border-left: 3px solid #ccc; }
    .status-tag.active { border-left-color: #3498db; background: #eaf2f8; }
    .status-tag.done { border-left-color: #2ecc71; background: #eafaf1; }
  </style>
</head>
<body>

<div id="app">
  <h2>生產流水線模擬系統</h2>
  <div id="controls">
    <button id="bStart">▶ 開始</button>
    <button id="bPause" disabled>⏸ 暫停</button>
    <button id="bResume" disabled>▶ 繼續</button>
    <button id="bReset">↺ 重置</button>
  </div>
  <canvas id="cvs" width="680" height="310"></canvas>
  <div id="info"></div>
</div>

<script>
// --- 全域硬體配置 ---
var cvs = document.getElementById('cvs');
var ctx = cvs.getContext('2d');
var W = 680, H = 310;
var CS = 58;         // 方格尺寸
var OX = 10, OY = 18; // 畫布原點偏移

// 計算主循環黑格 1~18 的幾何座標
function getCellCoords(n) {
  if (n >= 10 && n <= 15) return [OX + (n-10)*CS, OY];
  if (n === 16) return [OX + 5*CS, OY + CS];
  if (n === 17) return [OX + 5*CS, OY + 2*CS];
  if (n === 18) return [OX + 5*CS, OY + 3*CS];
  if (n >= 1 && n <= 6) return [OX + (6-n)*CS, OY + 4*CS];
  if (n === 7) return [OX, OY + 3*CS];
  if (n === 8) return [OX, OY + 2*CS];
  if (n === 9) return [OX, OY + CS];
  return [0,0];
}

// 建立黃色結束區儲位座標 (2x3 矩陣)
// 索引 0,1,2 為頂排(左至右)； 索引 3,4,5 為底排(左至右)
var FINISH_SLOTS = [];
var FX = OX + 6*CS + 6, FY = OY;
for (var r = 0; r < 2; r++) {
  for (var c = 0; c < 3; c++) {
    FINISH_SLOTS.push({x: FX + c*CS, y: FY + r*CS});
  }
}

// 建立紅色開始區儲位座標 (2x3 矩陣)
var START_SLOTS = [];
var SX = OX + 6*CS + 6, SY = OY + 3*CS;
for (var r = 0; r < 2; r++) {
  for (var c = 0; c < 3; c++) {
    START_SLOTS.push({x: SX + c*CS, y: SY + r*CS});
  }
}

// 動態時脈控制 (25幀完成移動，每45幀驅動一次決策)
var MOVE_DUR = 25;
var STEP_EVERY = 45;

// --- 核心物件導向設計 ---
class ConveyorCell {
  constructor(id, x, y) {
    this.id = id;
    this.x = x;
    this.y = y;
    this.ball = null; // 當前停留在該方格上的圓球物件
  }

  // 每個方格獨立執行的決策與判斷功能
  executeJudgment() {
    if (!this.ball || this.ball.moving) return;

    // 【黑色方格 15 號的專屬決策與分流邏輯】
    if (this.id === 15) {
      if (!this.ball.countedThisLap) {
        this.ball.laps++;
        this.ball.countedThisLap = true; // 鎖定防止單圈重複計數
      }

      // 自行判斷：是否跑滿 3 次？
      if (this.ball.laps >= 3) {
        // 依據球的 ID 決定精確的黃格槽位位置
        // 規格要求排法： 
        // 頂排(r=0): 6  5  4  -> 對應 FINISH_SLOTS 索引 0, 1, 2
        // 底排(r=1): 1  2  3  -> 對應 FINISH_SLOTS 索引 3, 4, 5
        var idToSlotMap = { 1: 3, 2: 4, 3: 5, 4: 2, 5: 1, 6: 0 };
        var targetSlot = idToSlotMap[this.ball.id];
        
        finishUsed[targetSlot] = true;
        
        var b = this.ball;
        this.ball = null; // 釋放 15 號方格
        
        b.done = true;
        b.onBelt = false;
        b.cellId = null;
        // 驅動分流，直奔指定的黃色儲位
        b.setTarget(FINISH_SLOTS[targetSlot].x + CS/2, FINISH_SLOTS[targetSlot].y + CS/2);
        return;
      }
    }

    // 【一般傳送判斷】
    var nextId = this.id % 18 + 1;
    var nextCell = cells[nextId];
    
    if (!nextCell.ball) {
      var b = this.ball;
      this.ball = null;       // 釋放當前格
      nextCell.ball = b;      // 佔用下一格
      b.cellId = nextId;
      
      if (nextId === 1) {
        b.countedThisLap = false; // 通過 1 號格重置計數鎖
      }
      
      b.setTarget(nextCell.x + CS/2, nextCell.y + CS/2);
    }
  }
}

// 圓球物件類別
class ItemBall {
  constructor(id, sx, sy) {
    this.id = id;
    this.cx = sx; this.cy = sy; // 當前 Canvas 物理座標
    this.sx = sx; this.sy = sy; // 起點
    this.tx = sx; this.ty = sy; // 終點
    this.cellId = null;         // 當前所在的黑格ID
    this.laps = 0;              // 跑線圈數
    this.done = false;          // 是否進入成品區
    this.moving = false;        // 是否處於移動動畫中
    this.mf = 0;                // 動態當前幀數
    this.onBelt = false;        // 是否已上輸送帶
    this.countedThisLap = false;
  }

  setTarget(tx, ty) {
    this.sx = this.cx;
    this.sy = this.cy;
    this.tx = tx;
    this.ty = ty;
    this.moving = true;
    this.mf = 0;
  }

  updateAnimation() {
    if (!this.moving) return;
    this.mf++;
    var p = Math.min(this.mf / MOVE_DUR, 1);
    var e = t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; // 舒適的緩動
    this.cx = this.sx + (this.tx - this.sx) * e(p);
    this.cy = this.sy + (this.ty - this.sy) * e(p);
    if (this.mf >= MOVE_DUR) {
      this.cx = this.tx;
      this.cy = this.ty;
      this.moving = false;
    }
  }
}

// --- 系統狀態變數 ---
var cells = {};
var balls = [];
var finishUsed = [];
var tick = 0;
var running = false;
var paused = false;
var raf;

function initSystem() {
  finishUsed = [false, false, false, false, false, false];
  tick = 0;
  running = false;
  paused = false;
  
  // 建立 1~18 號獨立決策方格物件
  for (var i = 1; i <= 18; i++) {
    var xy = getCellCoords(i);
    cells[i] = new ConveyorCell(i, xy[0], xy[1]);
  }

  // 配合附圖的紅格初始位置排法：底排由左至右 1,2,3 ；頂排由右至左 4,5,6
  // 對應 START_SLOTS 索引： 6->0, 5->1, 4->2, 1->3, 2->4, 3->5
  var startMapping = [3, 4, 5, 2, 1, 0];
  balls = [];
  for (var i = 0; i < 6; i++) {
    var slot = startMapping[i];
    var sx = START_SLOTS[slot].x + CS/2;
    var sy = START_SLOTS[slot].y + CS/2;
    balls.push(new ItemBall(i + 1, sx, sy));
  }
}

// --- 驅動運作核心 ---
function doProductionStep() {
  tick++;
  if (tick % STEP_EVERY !== 0) return; // 依時脈間隔驅動

  // 【核心功能：由格子自主判斷】
  // 逆向尋訪 (18倒推回1)，確保緊密跟車推擠時，不會發生單時脈連跳多格的狀況
  for (var i = 18; i >= 1; i--) {
    cells[i].executeJudgment();
  }

  // 【優化進料控制：完全移除空一格的限制】
  // 只要 1 號方格一空出來，立刻依序搜尋尚未進線的第一顆球，直接補位！
  if (!cells[1].ball) {
    for (var i = 0; i < balls.length; i++) {
      var b = balls[i];
      if (!b.onBelt && !b.done && b.cellId === null) {
        cells[1].ball = b;
        b.onBelt = true;
        b.cellId = 1;
        b.setTarget(cells[1].x + CS/2, cells[1].y + CS/2);
        break; // 每次時脈只進料一顆
      }
    }
  }
}

// --- 繪圖渲染表現層 ---
function drawRect(x, y, w, h, fill, stroke, lw) {
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = stroke;
  ctx.lineWidth = lw || 1.5;
  ctx.strokeRect(x, y, w, h);
}

function render() {
  ctx.clearRect(0, 0, W, H);

  // 1. 繪製 1~18 黑色主線格
  for (var i = 1; i <= 18; i++) {
    var c = cells[i];
    var fill = '#fff';
    var stroke = '#333';
    var lw = 1.5;
    if (i === 15) { fill = '#e8ffe8'; stroke = '#2a8a2a'; lw = 2; }
    drawRect(c.x, c.y, CS, CS, fill, stroke, lw);
    
    ctx.fillStyle = i === 15 ? '#2a8a2a' : '#aaa';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (i === 15) {
      ctx.fillText('15', c.x+CS/2, c.y+CS/2-7);
      ctx.fillText('判斷', c.x+CS/2, c.y+CS/2+7);
    } else {
      ctx.fillText(i, c.x+CS/2, c.y+CS/2);
    }
  }

  // 2. 繪製黃色結束區與格子內預期數字（淡淡標記方便核對）
  var finishLabels = [6, 5, 4, 1, 2, 3];
  for (var i = 0; i < FINISH_SLOTS.length; i++) {
    var f = FINISH_SLOTS[i];
    drawRect(f.x, f.y, CS, CS, '#fffbe6', '#d4a017', 2);
    ctx.fillStyle = '#eed690';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(finishLabels[i], f.x+CS/2, f.y+CS/2);
  }
  ctx.fillStyle = '#b8860b';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Finish →', FX, OY - 5);

  // 3. 繪製紅色開始區與格子內預期數字
  var startLabels = [6, 5, 4, 1, 2, 3];
  for (var i = 0; i < START_SLOTS.length; i++) {
    var s = START_SLOTS[i];
    drawRect(s.x, s.y, CS, CS, '#fff0f0', '#cc2222', 2);
    ctx.fillStyle = '#fca5a5';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(startLabels[i], s.x+CS/2, s.y+CS/2);
  }
  ctx.fillStyle = '#cc2222';
  ctx.font = 'bold 11px sans-serif';
  ctx.fillText('Start ←', SX, SY - 5);

  // 4. 繪製藍色物品圓球
  for (var i = 0; i < balls.length; i++) {
    var b = balls[i];
    var r = 17;
    ctx.beginPath();
    ctx.arc(b.cx, b.cy, r, 0, Math.PI*2);
    ctx.fillStyle = b.done ? '#e0e0e0' : '#cce8ff';
    ctx.fill();
    ctx.strokeStyle = b.done ? '#999' : '#1a7abf';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    
    ctx.fillStyle = b.done ? '#888' : '#0a4a7a';
    ctx.font = 'bold 14px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(b.id, b.cx, b.cy);

    // 在主線上時，顯示圈數點點
    if (b.onBelt && !b.done) {
      for (var d = 0; d < 3; d++) {
        ctx.beginPath();
        ctx.arc(b.cx - 10 + d*10, b.cy + r + 5, 3, 0, Math.PI*2);
        ctx.fillStyle = d < b.laps ? '#1a7abf' : '#ccc';
        ctx.fill();
      }
    }
  }
}

// --- 系統主循環 ---
function mainLoop() {
  if (!running || paused) return;
  doProductionStep();
  
  for (var i = 0; i < balls.length; i++) {
    balls[i].updateAnimation();
  }
  
  render();
  updateUiStatus();
  
  var allDone = balls.every(b => b.done);
  if (allDone) {
    running = false;
    updateButtonStates();
    render();
    updateUiStatus();
    return;
  }
  raf = requestAnimationFrame(mainLoop);
}

// --- UI 狀態更新 ---
function updateButtonStates() {
  document.getElementById('bStart').disabled = running;
  document.getElementById('bPause').disabled = !running || paused;
  document.getElementById('bResume').disabled = !paused;
}

function updateUiStatus() {
  var states = balls.map(function(b) {
    var cls = 'status-tag';
    var st = '待機中';
    if (b.done) { st = '✅ 已完工 (進入指定黃格)'; cls += ' done'; }
    else if (b.onBelt) { st = '運送中 (第 ' + b.laps + ' 圈, 方格 ' + b.cellId + ')'; cls += ' active'; }
    return '<div class="' + cls + '"><b>物料 ' + b.id + '</b>：' + st + '</div>';
  });
  document.getElementById('info').innerHTML = states.join('');
}

// 按鈕事件綁定
document.getElementById('bStart').onclick = function() {
  if (running) return;
  initSystem();
  running = true; paused = false;
  updateButtonStates();
  mainLoop();
};
document.getElementById('bPause').onclick = function() {
  paused = true;
  if (raf) cancelAnimationFrame(raf);
  updateButtonStates();
};
document.getElementById('bResume').onclick = function() {
  if (!paused) return;
  paused = false;
  updateButtonStates();
  mainLoop();
};
document.getElementById('bReset').onclick = function() {
  if (raf) cancelAnimationFrame(raf);
  running = false; paused = false;
  initSystem();
  updateButtonStates();
  updateUiStatus();
  render();
};

// 初始化
initSystem();
updateButtonStates();
updateUiStatus();
render();
</script>
</body>
</html>
